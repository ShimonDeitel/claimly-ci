name: Claimly
options:
  bundleIdPrefix: com.shimondeitel.claimly
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Claimly:
    type: application
    platform: iOS
    sources:
      - path: Claimly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.claimly
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Claimly/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ClaimlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ClaimlyTests
      - path: Claimly.storekit
    dependencies:
      - target: Claimly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.claimly.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ClaimlyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ClaimlyUITests
    dependencies:
      - target: Claimly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.claimly.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Claimly:
    build:
      targets:
        Claimly: all
        ClaimlyTests: [test]
        ClaimlyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Claimly.storekit
    test:
      config: Debug
      storeKitConfiguration: Claimly.storekit
      targets:
        - ClaimlyTests
        - ClaimlyUITests
    archive:
      config: Release
